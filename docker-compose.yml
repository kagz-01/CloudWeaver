version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cloudweaver_db
      POSTGRES_USER: cloudweaver
      POSTGRES_PASSWORD: cloudweaver_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudweaver -d cloudweaver_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.13.3
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/cloudweaver_db
      SPRING_DATASOURCE_USERNAME: cloudweaver
      SPRING_DATASOURCE_PASSWORD: cloudweaver_password
      SPRING_VAULT_URI: http://vault:8200
      SPRING_VAULT_TOKEN: root
    depends_on:
      db:
        condition: service_healthy
      vault:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
