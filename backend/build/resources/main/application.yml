spring:
  application:
    name: cloudweaver-api
  datasource:
    url: jdbc:postgresql://localhost:5432/cloudweaver_db
    username: cloudweaver
    password: cloudweaver_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  cloud:
    vault:
      uri: http://localhost:8200
      token: root
      scheme: http

server:
  port: 8080
